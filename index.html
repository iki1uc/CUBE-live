<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CubeLIVE LVL-UP</title>
  <style>
    #lvlup-box {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    #lvlup-img {
      max-width: 100%;
      max-height: 100%;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Trigger (Umgebung: Klick, später beliebig ersetzbar) -->
  <button onclick="lvlUp()">LVL-UP jetzt</button>

  <!-- CubeLIVE LVL-UP Fläche -->
  <div id="lvlup-box">
    <img id="lvlup-img" src="" alt="LVL-UP">
  </div>

  <script>
    const BIG_GIF  = "iki1üc-COPYRIGHT.gif";   // großer Effekt
    const SMALL_GIF = "2ui-copyright.gif";     // kleiner Effekt (Fallback)

    function showGif(src) {
      const img = document.getElementById("lvlup-img");
      img.style.display = "none";
      img.onerror = null; // alte Fehler-Handler löschen
      img.onload = () => { img.style.display = "block"; };
      img.src = src;
    }

    function lvlUp() {
      const img = document.getElementById("lvlup-img");

      // zuerst großer LVL-UP
      img.onerror = () => {
        // wenn großer nicht geht → kleiner LVL-UP
        showGif(SMALL_GIF);
      };

      showGif(BIG_GIF);
    }
  </script>

</body>
</html>
