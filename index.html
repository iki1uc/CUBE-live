<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CUBE‑BOARD 3x</title>
  <style>
    body {
      font-family: monospace;
      background:#000;
      color:#0f0;
      padding:20px;
    }
    .layout {
      display:grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: auto auto auto;
      gap:10px;
    }
    .top-row {
      grid-column:1 / 2;
      display:flex;
      gap:10px;
    }
    .cube {
      flex:1;
      border:1px solid #0f0;
      padding:10px;
      min-height:80px;
    }
    .detail {
      grid-column:2 / 3;
      grid-row:1 / 3;
      border:1px solid #0f0;
      padding:10px;
      min-height:200px;
    }
    .morse {
      grid-column:1 / 2;
      border:1px dashed #0f0;
      padding:10px;
      min-height:40px;
    }
    .bottom {
      grid-column:1 / 3;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .control {
      flex:1;
      border:1px solid #0f0;
      padding:10px;
      min-height:60px;
    }
    .repo-btn {
      margin-top:10px;
    }
    button {
      background:#020;
      color:#0f0;
      border:1px solid #0f0;
      padding:5px 10px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>CUBE‑BOARD (3 Cubes + Detail)</h1>

<div class="layout">

  <!-- Obere 3 Cubes -->
  <div class="top-row">
    <div class="cube" id="cube-a">
      <strong>CUBE‑A</strong>
      <pre>(Status A …)</pre>
    </div>
    <div class="cube" id="cube-b">
      <strong>CUBE‑B</strong>
      <pre>(Status B …)</pre>
    </div>
    <div class="cube" id="cube-c">
      <strong>CUBE‑C</strong>
      <pre>(Status C …)</pre>
    </div>
  </div>

  <!-- Detail‑Zone rechts (A/B/C) -->
  <div class="detail" id="detail-zone">
    <strong>DETAIL‑ZONE (A/B/C)</strong>
    <pre>(Hier später Detail‑Module A/B/C)</pre>
    <div class="repo-btn">
      <button id="repo-test">REPO‑TEST</button>
    </div>
  </div>

  <!-- Morse‑Zone zwischen oben und unten -->
  <div class="morse" id="morse-zone">
    <strong>MORSE‑RHYTHMUS</strong>
    <pre>(später Takt, ohne Alarm)</pre>
  </div>

  <!-- Unterer Bereich: Kontrolle / frei für CUBE‑6 etc. -->
  <div class="bottom">
    <div class="control" id="control-left">
      <strong>CONTROL‑LEFT</strong>
      <pre>(z.B. UIME / Scan)</pre>
    </div>
    <div class="control" id="control-right">
      <strong>CONTROL‑RIGHT</strong>
      <pre>(z.B. Reaffindessen / NC‑Takt)</pre>
    </div>
  </div>

</div>

</body>
</html>
