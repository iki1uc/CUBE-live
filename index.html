<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CUBE‑LIVE / ROOT</title>
  <style>
    body { font-family: monospace; background:#000; color:#0f0; padding:20px; }
    button { margin:5px; padding:10px; font-size:16px; }
  </style>
</head>
<body>

<h1>CUBE‑LIVE / ROOT</h1>

<p>Aktiver Slot wählen:</p>

<button onclick="setSlot(1)">Slot 1</button>
<button onclick="setSlot(2)">Slot 2</button>
<button onclick="setSlot(3)">Slot 3</button>
<button onclick="setSlot(4)">Slot 4</button>

<hr>

<h3>Weiter:</h3>

<button onclick="goLive()">→ LIVE</button>
<button onclick="goMirror()">→ MIRROR</button>

<script>
function setSlot(n) {
  localStorage.setItem("cube_active", n);
  alert("Slot " + n + " gesetzt.");
}

function goLive() {
  const slot = localStorage.getItem("cube_active") || "-";
  window.location.href = "live.html?slot=" + slot;
}

function goMirror() {
  const slot = localStorage.getItem("cube_active") || "-";
  window.location.href = "mirror.html?slot=" + slot;
}
</script>

</body>
</html>
