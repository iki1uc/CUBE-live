<div id="cube_live" style="width:200px;height:200px;background:#000;display:flex;align-items:center;justify-content:center;">
  <img id="cube_gif" src="" style="max-width:100%;max-height:100%;display:none;">
</div>

<script>
  const FULL = "iki1üc-COPYRIGHT.gif";
  const MINI = "2ui-copyright.gif";

  function cubeShow(src) {
    const img = document.getElementById("cube_gif");
    img.style.display = "none";
    img.onerror = null;
    img.onload = () => img.style.display = "block";
    img.src = src;
  }

  async function cubeLVLUP() {
    try {
      const res = await fetch("/api/lvlup", { method: "POST" });
      const data = await res.json();

      if (data.mode === "FULL") cubeShow(FULL);
      else cubeShow(MINI);

    } catch (e) {
      cubeShow(MINI);
    }
  }

  // Startzustand
  window.addEventListener("load", () => cubeShow(MINI));
</script>
