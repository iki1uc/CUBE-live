<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title># SHIFT — Le Mio 2026</title>

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        color: #eee;
        font-family: monospace;
        text-align: center;
        overflow: hidden;
    }

    /* Canvas für Farbkleckser */
    #klecksCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
    }

    .title {
        margin-top: 40px;
        font-size: 2.2rem;
        letter-spacing: 3px;
    }

    .tag {
        color: #fff;
        font-weight: bold;
    }

    .jp {
        color: #ff4f4f;
        font-size: 1.3rem;
        margin-top: 10px;
    }

    .de {
        color: #3cc;
        margin-top: 25px;
        font-size: 1rem;
    }

    .fr {
        color: #c33;
        margin-top: 15px;
        font-size: 1rem;
    }

    img {
        margin-top: 40px;
        max-width: 60%;
        border: 2px solid #333;
        box-shadow: 0 0 20px #000;
    }
</style>
</head>

<body>

<canvas id="klecksCanvas"></canvas>

<div class="title">
    <span class="tag">#</span> SHIFT — <span class="fr">Le Mio</span>
</div>

<div class="jp">時間のずれで、君を救う。</div>

<img src="dein-do.gif" alt="DO GIF">

<p class="de">
    # DE: Aus dem Chaos entsteht Form.<br>
    Aus dem Klecks entsteht der Weg.<br>
    Aus dem Moment entsteht der Shift.
</p>

<p class="fr">
    # FR: Du chaos naît la forme.<br>
    De la tache naît la voie.<br>
    Du moment naît le Shift.
</p>

<script>
/* Farbklecks‑Explosion */
const c = document.getElementById("klecksCanvas");
const ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

function klecks() {
    for (let i = 0; i < 80; i++) {
        let x = Math.random() * c.width;
        let y = Math.random() * c.height;
        let r = Math.random() * 60 + 10;
        let color = `hsla(${Math.random()*360}, 80%, 60%, 0.25)`;
        ctx.beginPath();
        ctx.fillStyle = color;
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
    }
}
klecks();
</script>

</body>
</html>
