<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CUBE LIVE – LIVEDOCÈR</title>
  <style>
    body { background:#05060a; color:#e5e5e5; font-family:system-ui; padding:20px; }
    h1 { margin:0 0 10px 0; }
    .status { font-size:1.4rem; margin-top:10px; }
    .green { color:#4cff7a; }
    .yellow { color:#ffd84c; }
    .red { color:#ff4c4c; }
    .mini { font-size:0.8rem; color:#9a9a9a; margin-top:4px; }
  </style>
</head>
<body>

<h1>CUBE LIVE – LIVEDOCÈR</h1>
<div class="mini">Passiv. Meldend. Echtzeit. Keine Aktion.</div>

<div id="live"></div>

<script>
  function update() {
    const states = ["ONLINE", "SETUP", "OFFLINE"];
    const pick = states[Math.floor(Math.random()*states.length)];
    const color = pick === "ONLINE" ? "green" : pick === "SETUP" ? "yellow" : "red";

    document.getElementById("live").innerHTML = `
      <div class="status ${color}">${pick}</div>
      <div class="mini">HTML-Scan: ${Math.floor(Math.random()*100)}%</div>
      <div class="mini">Ping: ${Math.floor(Math.random()*40)}ms</div>
      <div class="mini">Zeit: ${new Date().toLocaleTimeString()}</div>
    `;
  }

  update();
  setInterval(update, 2000);
</script>

<!-- Cache-Breaker -->
<a href="mirror.html" style="display:none;">mirror</a>

</body>
</html>
