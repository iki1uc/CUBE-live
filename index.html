<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CUBE LIVE – 12-Matrix</title>
  <style>
    body {
      background: #050608;
      color: #eee;
      font-family: system-ui, sans-serif;
    }

    h1 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .meta {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 70px);
      grid-auto-rows: 70px;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .cell {
      position: relative;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: #888;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
    }

    .cell span.label {
      pointer-events: none;
    }

    /* Reihen-Layout: 3 / 6 / 3 */
    .cell.r1 { grid-row: 1; }
    .cell.r2 { grid-row: 2; }
    .cell.r3 { grid-row: 3; }

    .cell.r1:nth-child(1) { grid-column: 2; }
    .cell.r1:nth-child(2) { grid-column: 3; }
    .cell.r1:nth-child(3) { grid-column: 4; }

    .cell.r3:nth-child(n+10) { /* unten 3 mittig */
      /* wird über JS gesetzt, hier nur Platzhalter */
    }

    /* aktive Zelle pro Reihe */
    .active-head {
      background: #1f4fff;
      color: #fff;
      box-shadow: 0 0 12px rgba(80,120,255,0.8);
      transform: translateY(-2px);
    }

    .active-narr {
      background: #0f7f4f;
      color: #fff;
      box-shadow: 0 0 12px rgba(40,200,120,0.8);
      transform: translateY(-2px);
    }

    .active-func {
      background: #b36b00;
      color: #fff;
      box-shadow: 0 0 12px rgba(255,180,80,0.8);
      transform: translateY(-2px);
    }

    /* x / 8 Overlay */
    .overlay {
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 0.6rem;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(0,0,0,0.7);
      color: #ccc;
    }

    .overlay.x {
      border: 1px solid #ff4f7a;
      color: #ff4f7a;
    }

    .overlay.eight {
      border: 1px solid #3ccf9f;
      color: #3ccf9f;
    }

    /* Trigger-Leiste */
    .triggers {
      display: flex;
      gap: 6px;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .triggers button {
      background: #111;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .triggers button:hover {
      border-color: #888;
    }

    .triggers button.active {
      background: #1f4fff;
      border-color: #7fa0ff;
      color: #fff;
    }

    .status-line {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>CUBE LIVE – 12‑Matrix</h1>
  <div class="meta">
    Passiv. Meldend. Echtzeit. Keine Aktion. – Anzeige‑Layer, kein Eingriff.
  </div>

  <div class="grid" id="cube-grid">
    <!-- Obere 3 (Kopf: ANKER / CALC / iki1uc) -->
    <div class="cell r1" data-id="1"><span class="label">S01</span></div>
    <div class="cell r1" data-id="2"><span class="label">S02</span></div>
    <div class="cell r1" data-id="3"><span class="label">S03</span></div>

    <!-- Mittlere 6 (Narrativ-Schalter) -->
    <div class="cell r2" data-id="4"><span class="label">S04</span></div>
    <div class="cell r2" data-id="5"><span class="label">S05</span></div>
    <div class="cell r2" data-id="6"><span class="label">S06</span></div>
    <div class="cell r2" data-id="7"><span class="label">S07</span></div>
    <div class="cell r2" data-id="8"><span class="label">S08</span></div>
    <div class="cell r2" data-id="9"><span class="label">S09</span></div>

    <!-- Untere 3 (Toilator / UIME / Scan/Manipulator) -->
    <div class="cell r3" data-id="10"><span class="label">S10</span></div>
    <div class="cell r3" data-id="11"><span class="label">S11</span></div>
    <div class="cell r3" data-id="12"><span class="label">S12</span></div>
  </div>

  <div class="triggers">
    <button data-mode="head" class="active">Kopf‑Rotation</button>
    <button data-mode="narr">Narrativ‑Rotation</button>
    <button data-mode="func">Funktion‑Rotation</button>
    <button data-mode="x">x‑Overlay</button>
    <button data-mode="8">8‑Overlay</button>
    <button data-mode="mix">Mix‑Modus</button>
  </div>

  <div class="status-line" id="status-line">
    Modus: Kopf‑Rotation · Aktiv: S01 / S04 / S10
  </div>

  <script>
    // IDs pro Reihe
    const heads = [1, 2, 3];        // oben
    const narrs = [4, 5, 6, 7, 8, 9]; // mitte
    const funcs = [10, 11, 12];     // unten

    let headIndex = 0;
    let narrIndex = 0;
    let funcIndex = 0;

    let mode = "head"; // head, narr, func, x, 8, mix

    const grid = document.getElementById("cube-grid");
    const statusLine = document.getElementById("status-line");

    function getCell(id) {
      return grid.querySelector(`.cell[data-id="${id}"]`);
    }

    function clearActive() {
      grid.querySelectorAll(".cell").forEach(c => {
        c.classList.remove("active-head", "active-narr", "active-func");
      });
    }

    function clearOverlay() {
      grid.querySelectorAll(".overlay").forEach(o => o.remove());
    }

    function setOverlay(id, type) {
      const cell = getCell(id);
      if (!cell) return;
      const ov = document.createElement("div");
      ov.classList.add("overlay");
      if (type === "x") {
        ov.classList.add("x");
        ov.textContent = "x";
      } else if (type === "8") {
        ov.classList.add("eight");
        ov.textContent = "8";
      }
      cell.appendChild(ov);
    }

    function updateStatus() {
      const h = heads[headIndex];
      const n = narrs[narrIndex];
      const f = funcs[funcIndex];
      statusLine.textContent =
        `Modus: ${mode} · Aktiv: S${String(h).padStart(2,"0")} / S${String(n).padStart(2,"0")} / S${String(f).padStart(2,"0")}`;
    }

    function step() {
      clearActive();
      clearOverlay();

      // Standard: immer 1 pro Reihe aktiv
      const h = heads[headIndex];
      const n = narrs[narrIndex];
      const f = funcs[funcIndex];

      if (mode === "head" || mode === "mix") {
        getCell(h)?.classList.add("active-head");
      }
      if (mode === "narr" || mode === "mix") {
        getCell(n)?.classList.add("active-narr");
      }
      if (mode === "func" || mode === "mix") {
        getCell(f)?.classList.add("active-func");
      }

      if (mode === "x" || mode === "mix") {
        setOverlay(n, "x"); // Narrativ‑Slot bekommt x
      }
      if (mode === "8" || mode === "mix") {
        setOverlay(f, "8"); // unterer Slot bekommt 8
      }

      updateStatus();

      // Rotation
      headIndex = (headIndex + 1) % heads.length;
      narrIndex = (narrIndex + 1) % narrs.length;
      funcIndex = (funcIndex + 1) % funcs.length;
    }

    // Trigger‑Buttons
    document.querySelectorAll(".triggers button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".triggers button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        mode = btn.dataset.mode;
        // sofort ein Step, damit man direkt was sieht
        headIndex = 0;
        narrIndex = 0;
        funcIndex = 0;
        step();
      });
    });

    // Start
    step();
    setInterval(step, 900); // ~1 Sekunde pro Schritt
  </script>
</body>
</html>
