<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Trihundertvier – BIOS</title>

  <!-- Deine bestehende CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Deine bestehenden Scripts -->
  <script src="cube-core.js"></script>
  <script src="verhandlungcore.js"></script>
  <script src="core_alpha.js"></script>
</head>

<body>

  <h1>Trihundertvier – BIOS Start</h1>

  <!-- CUBE STATUS -->
  <div id="cube-anker">Cube-Anker: –</div>
  <div id="cube-status">Cube-Status: –</div>

  <!-- CUBE 0 – sicherste Maske -->
  <div id="cube0" class="cube-mask cube0">
    <div class="cell a"></div>
    <div class="cell b"></div>
    <div class="cell c"></div>

    <div class="cell d"></div>
    <div class="cell e input-pol"></div>
    <div class="cell f"></div>

    <div class="cell g"></div>
    <div class="cell h"></div>
    <div class="cell i"></div>
  </div>

  <!-- TESTBUTTONS -->
  <button onclick="cubeKontakt('CUBE_0','System-Init')">CUBE_0</button>
  <button onclick="cubeKontakt('CUBE_1','RAW')">CUBE_1</button>
  <button onclick="cubeKontakt('CUBE_2','SAFE')">CUBE_2</button>

  <hr>

  <!-- WÜRFEL -->
  <h2>Würfel</h2>
  <input id="p1" type="number" value="1">
  <input id="p2" type="number" value="2">
  <input id="p3" type="number" value="3">
  <input id="p4" type="number" value="4">
  <button onclick="berechneWuerfel()">Berechnen</button>
  <div id="output">–</div>

  <hr>

  <!-- VR -->
  <h2>Verhandlungsstatus</h2>
  <button onclick="zeigeVerhandlungsStatus(1,1,1,1)">VR testen</button>
  <div id="vr-box">–</div>

</body>
</html>
