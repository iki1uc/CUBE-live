<h2>CUBE LIVE – Status</h2>

<div id="status-box" style="
  background:#111; padding:12px; border:1px solid #333; border-radius:6px;
  width:260px; font-family:system-ui; color:#ccc;">
  <div>Modus: <span id="live-mode">SCAN</span></div>
  <div>HTML-Scan: <span id="scan">0%</span></div>
  <div>Ping: <span id="ping">0ms</span></div>
  <div>Status: <span id="state">OFFLINE</span></div>
  <div>Aktiv: <span id="active">–</span></div>
</div>

<script>
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function updateLive(){
  document.getElementById("scan").textContent = rand(1,100) + "%";
  document.getElementById("ping").textContent = rand(1,12) + "ms";

  let s = document.getElementById("state");
  let r = rand(1,3);

  if(r===1){ s.textContent="ONLINE"; s.style.color="#3ccf9f"; }
  if(r===2){ s.textContent="WARTET"; s.style.color="#ffcc00"; }
  if(r===3){ s.textContent="OFFLINE"; s.style.color="#ff4f7a"; }

  // Verbindung zur Matrix (nur Demo)
  let active = "S0" + rand(1,12);
  document.getElementById("active").textContent = active;
}

setInterval(updateLive, 900);
updateLive();
</script>
